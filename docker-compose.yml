services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       reddit_intel
      POSTGRES_USER:     intel
      POSTGRES_PASSWORD: intel
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intel -d reddit_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
